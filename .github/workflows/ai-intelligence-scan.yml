name: 🤖 AI 全球情报扫描

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "推送模式"
        required: false
        default: "json"
        type: choice
        options: ["telegram", "feishu", "dingtalk", "email", "notion", "json", "all"]

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 📡 创建数据目录
        run: mkdir -p data

      - name: 🔄 恢复缓存
        uses: actions/cache@v4
        with:
          path: data/cache.db
          key: ai-intel-cache-${{ github.run_id }}
          restore-keys: |
            ai-intel-cache-

      - name: 🚀 运行全球情报扫描
        env:
          PYTHONIOENCODING: utf-8
          DEEPSEEK_API_KEY: *** secrets.DEEPSEEK_API_KEY }}
          PUSH_MODE: "json"
        run: python scripts/main.py

      - name: 📊 上传情报结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-intelligence-output
          path: data/intelligence_output.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 💾 保存缓存
        if: always()
        uses: actions/cache@v4
        with:
          path: data/cache.db
          key: ai-intel-cache-${{ github.run_id }}
